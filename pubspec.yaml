name: mira
description: Mira — AI Companion App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  firebase_core: ^3.15.2
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.6.12
  supabase_flutter: ^2.8.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.3
  http: ^1.2.1
  socket_io_client: ^2.0.2
  speech_to_text: ^7.3.0
  audio_session: ^0.1.21          # runtime dep — used by voice_call_service.dart
  intl: ^0.19.0
  flutter_markdown: ^0.7.3
  permission_handler: ^11.3.1
  flutter_dotenv: ^5.1.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.3
  logger: ^2.4.0
  uuid: ^4.4.0
  just_audio: ^0.10.5
  rive: ^0.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/animations/
    - assets/images/
    - assets/audio/
